<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01 - Hook</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative;
  }
  .blurred-bg {
    position: absolute; top: -80px; left: -80px;
    width: calc(100% + 160px); height: calc(100% + 160px);
    background-image: url('../../images/5287492.jpg');
    background-size: cover; background-position: center;
    filter: blur(28px) brightness(0.35) saturate(0.8); z-index: 0;
  }

  /* Card — absolutely centered horizontally */
  .card-img {
    position: absolute; z-index: 2;
    top: 70px;
    left: 50%; transform: translateX(-50%);
    width: 500px; border-radius: 20px;
    box-shadow: 0 30px 90px rgba(0,0,0,0.7);
  }

  /* Price badge — independent of card, top-right */
  .price-badge {
    position: absolute; z-index: 3; top: 70px; right: 80px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .badge-arrow {
    width: 0; height: 0;
    border-left: 38px solid transparent; border-right: 38px solid transparent;
    border-bottom: 58px solid #22C55E;
  }
  .badge-pct { font-size: 34px; font-weight: 700; color: #22C55E; }

  /* Text zone — bottom, overlaps card */
  .text-zone {
    position: absolute; z-index: 4; bottom: 60px; left: 50px; right: 50px;
  }
  .headline {
    font-weight: 700; text-transform: uppercase; line-height: 0.88;
    letter-spacing: -4px; text-align: left;
    text-shadow: 0 6px 40px rgba(0,0,0,0.8), 0 2px 12px rgba(0,0,0,0.6);
  }
  .headline span {
    display: block; font-size: 128px; color: #FFFFFF;
  }
  .headline .green { color: #22C55E; }

  .swipe-cta {
    position: absolute; bottom: 24px; left: 50px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.35);
    text-transform: uppercase; letter-spacing: 6px; z-index: 5;
  }
  .watermark { position: absolute; top: 24px; left: 24px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: rgba(255, 68, 68, 0.9); padding: 10px 18px; border-radius: 4px;
  }
  .handle {
    position: absolute; bottom: 24px; right: 44px;
    font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.45); z-index: 10;
  }
</style>
</head>
<body>
  <div class="blurred-bg"></div>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>

  <!-- Card — absolutely centered -->
  <img class="card-img" src="../../images/5287492.jpg" alt="Magikarp IR">

  <!-- Badge — independent, top-right -->
  <div class="price-badge"><div class="badge-arrow"></div><span class="badge-pct">+17%</span></div>

  <!-- Text overlapping into card zone -->
  <div class="text-zone">
    <div class="headline">
      <span>MAGIKARP AR</span>
      <span>NAIK <span class="green" style="display:inline">+17%</span></span>
      <span>DALAM 30 HARI</span>
    </div>
  </div>

  <div class="swipe-cta">GESER &gt;&gt;&gt;&gt;&gt;</div>
  <div class="handle">@gokatrades</div>
</body>
</html>
