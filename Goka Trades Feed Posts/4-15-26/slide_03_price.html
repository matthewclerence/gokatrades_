<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 03 - Raw Price</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative; color: #FFFFFF;
  }
  .blurred-bg {
    position: absolute; top: -80px; left: -80px;
    width: calc(100% + 160px); height: calc(100% + 160px);
    background-image: url('../../images/5287492.jpg');
    background-size: cover; background-position: center;
    filter: blur(35px) brightness(0.3) saturate(0.7); z-index: 0;
  }
  .watermark { position: absolute; top: 24px; left: 24px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: rgba(255, 68, 68, 0.9); padding: 10px 18px; border-radius: 4px;
  }
  .handle {
    position: absolute; bottom: 24px; right: 44px;
    font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.45); z-index: 10;
  }
  .page-content {
    position: relative; z-index: 2; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 50px 0;
  }
  .section-label {
    font-size: 24px; font-weight: 700; color: #FF4444;
    text-transform: uppercase; letter-spacing: 10px; margin-bottom: 46px;
  }
  .section-underline { display: block; width: 70px; height: 4px; background: #FF4444; margin: 14px auto 0; }
  .price-section {
    display: flex; align-items: center; justify-content: center;
    gap: 56px; padding: 0 56px; margin-bottom: 36px;
  }
  .card-img { width: 400px; border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,0.5); }
  .price-info { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .price-big { font-size: 116px; font-weight: 700; color: #FFFFFF; line-height: 1; }
  .price-sub { font-size: 24px; font-weight: 400; color: #A0A0A0; text-align: center; line-height: 1.5; }
  .price-date { font-size: 24px; font-weight: 600; color: #22C55E; }
  .trend-badge {
    display: flex; align-items: center; gap: 14px;
    background: rgba(34, 197, 94, 0.15); border: 2px solid #22C55E;
    border-radius: 12px; padding: 16px 36px; margin-top: 8px;
  }
  .trend-arrow { font-size: 30px; color: #22C55E; }
  .trend-text { font-size: 28px; font-weight: 700; color: #22C55E; text-transform: uppercase; letter-spacing: 5px; }
  .trend-period { text-align: center; font-size: 22px; font-weight: 600; color: #A0A0A0; margin-top: 10px; }
  .chart-section {
    width: calc(100% - 112px); padding: 28px 40px;
    border-top: 1px solid rgba(255,255,255,0.1); margin-top: 24px;
  }
  .chart-title { font-size: 22px; font-weight: 700; color: #FF4444; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; }
  .chart-area { position: relative; width: 100%; height: 220px; }
  .chart-svg { width: 100%; height: 100%; }
  .chart-labels { display: flex; justify-content: space-between; margin-top: 10px; }
  .chart-label { font-size: 20px; font-weight: 600; color: #A0A0A0; }
  .chart-value-start { position: absolute; top: 140px; left: 0; font-size: 20px; font-weight: 600; color: #A0A0A0; }
  .chart-value-end { position: absolute; top: 8px; right: 0; font-size: 26px; font-weight: 700; color: #22C55E; }
</style>
</head>
<body>
  <div class="blurred-bg"></div>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>
  <div class="page-content">
    <div class="section-label">HARGA RAW · NEAR MINT<span class="section-underline"></span></div>
    <div class="price-section">
      <img class="card-img" src="../../images/5287492.jpg" alt="Magikarp IR">
      <div class="price-info">
        <div class="price-big">$327.61</div>
        <div class="price-sub">Harga model Collectrics<br>Ungraded — Near Mint</div>
        <div class="price-date">Per 10 April 2026</div>
        <div class="trend-badge"><span class="trend-arrow">&#9650;</span><span class="trend-text">NAIK</span></div>
        <div class="trend-period">Tren 30 Hari<br>11 Mar — 10 Apr 2026</div>
      </div>
    </div>
    <div class="chart-section">
      <div class="chart-title">30 Hari Terakhir</div>
      <div class="chart-area">
        <div class="chart-value-start">$280</div>
        <div class="chart-value-end">$327</div>
        <svg class="chart-svg" viewBox="0 0 840 200" preserveAspectRatio="none">
          <line x1="0" y1="180" x2="840" y2="180" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="6,4"/>
          <line x1="0" y1="100" x2="840" y2="100" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="6,4"/>
          <defs><linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22C55E" stop-opacity="0.3"/><stop offset="100%" stop-color="#22C55E" stop-opacity="0.02"/></linearGradient></defs>
          <path d="M0,160 C60,158 120,155 180,150 C240,145 280,148 320,140 C360,132 400,130 440,125 C480,118 520,100 560,80 C600,60 640,50 700,35 C740,25 800,18 840,12 L840,200 L0,200 Z" fill="url(#gG)"/>
          <path d="M0,160 C60,158 120,155 180,150 C240,145 280,148 320,140 C360,132 400,130 440,125 C480,118 520,100 560,80 C600,60 640,50 700,35 C740,25 800,18 840,12" fill="none" stroke="#22C55E" stroke-width="4" stroke-linecap="round"/>
          <circle cx="840" cy="12" r="8" fill="#22C55E"/>
        </svg>
      </div>
      <div class="chart-labels"><span class="chart-label">11 Mar</span><span class="chart-label">10 Apr</span></div>
    </div>
  </div>
  <div class="handle">@gokatrades</div>
</body>
</html>
