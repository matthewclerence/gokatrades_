<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 05 - CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1440px; overflow: hidden; background: #111111; font-family: 'Space Grotesk', sans-serif; color: #FFFFFF; display: flex; align-items: center; justify-content: center; }
  .stage { position: relative; width: 1080px; height: 1440px; background: #111111; overflow: hidden; display: flex; align-items: center; justify-content: center; }

  .cta-wrap {
    text-align: center; position: relative; z-index: 5;
    max-width: 900px; padding: 40px;
  }

  .cta-sub {
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.5);
    letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px;
  }

  .cta-lockup {
    font-size: 120px; font-weight: 700; letter-spacing: -4px;
    line-height: 0.95; margin-bottom: 30px;
  }
  .cta-lockup .white { color: #FFFFFF; }
  .cta-lockup .red { color: #FF4444; }

  .cta-tagline {
    font-size: 26px; font-weight: 500; color: rgba(255,255,255,0.75);
    line-height: 1.4; margin-bottom: 56px;
  }

  .cta-btn {
    display: inline-block;
    background: #FF4444;
    color: #FFFFFF;
    padding: 24px 60px;
    font-size: 28px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 6px;
    border-radius: 8px;
    margin-bottom: 50px;
  }

  .social-row {
    display: flex; gap: 36px; justify-content: center;
    font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.6);
    letter-spacing: 3px; text-transform: uppercase;
  }

  .watermark {
    position: absolute; top: 24px; left: 24px;
    background: #FF4444; color: #FFFFFF;
    font-weight: 700; font-size: 22px; letter-spacing: 2px;
    padding: 10px 18px; border-radius: 4px; z-index: 5;
  }
  .series-tag {
    position: absolute; top: 82px; left: 24px;
    font-size: 20px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 4px;
    color: #FFFFFF; line-height: 1; z-index: 5;
  }

  .source {
    position: absolute; bottom: 36px; left: 0; right: 0;
    text-align: center;
    font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.35);
    letter-spacing: 2px; z-index: 5;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="watermark">GOKATRADES</div>
    <div class="series-tag">NEWS · CHINA TCG</div>

    <div class="cta-wrap">
      <div class="cta-sub">Gem Pack Vol. 5 · Rilis 24 April 2026</div>
      <div class="cta-lockup"><span class="white">GOKA</span><span class="red">TRADES</span></div>
      <div class="cta-tagline">Follow buat info rilis Pokémon TCG paling cepat &amp; clean — EN, JP, KR, CN semua kita pantau.</div>
      <div class="cta-btn">Follow @gokatrades</div>
      <div class="social-row">
        <div>Instagram · @gokatrades</div>
        <div>TikTok · @gokatrades</div>
      </div>
    </div>
    <div class="source">Sumber: PokéBeach · Maret 2026</div>
  </div>
</body>
</html>
