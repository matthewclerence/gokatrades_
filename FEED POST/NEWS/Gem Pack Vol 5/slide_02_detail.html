<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 02 - Detail Set</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1440px; overflow: hidden; background: #111111; font-family: 'Space Grotesk', sans-serif; color: #FFFFFF; }
  .stage { position: relative; width: 1080px; height: 1440px; background: #111111; overflow: hidden; }

  /* Pack image left */
  .pack-col {
    position: absolute; top: 140px; left: 60px; bottom: 140px;
    width: 440px; z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }
  .pack-col img {
    max-height: 100%; max-width: 100%; width: auto;
    filter: drop-shadow(0 24px 60px rgba(0,0,0,0.65));
  }

  /* Vertical DETAIL SET label */
  .vertical-label {
    position: absolute; top: 160px; left: 560px;
    font-size: 22px; font-weight: 700; color: #FF4444;
    letter-spacing: 12px; text-transform: uppercase;
    z-index: 4;
  }
  .vertical-label::after {
    content: ''; display: block; width: 70px; height: 4px;
    background: #FF4444; margin-top: 14px;
  }

  /* Key-value rows right */
  .info-panel {
    position: absolute; top: 240px; left: 560px; right: 60px; z-index: 4;
    display: flex; flex-direction: column; gap: 18px;
  }
  .info-row {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 20px 24px;
  }
  .info-label {
    font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.55);
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 6px;
  }
  .info-value {
    font-size: 26px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.5px;
    line-height: 1.15;
  }
  .info-value .accent { color: #FF4444; }

  .body-note {
    position: absolute; bottom: 120px; left: 60px; right: 60px;
    font-size: 20px; font-weight: 400; color: rgba(255,255,255,0.75);
    line-height: 1.4;
  }

  .watermark {
    position: absolute; top: 24px; left: 24px;
    background: #FF4444; color: #FFFFFF;
    font-weight: 700; font-size: 22px; letter-spacing: 2px;
    padding: 10px 18px; border-radius: 4px; z-index: 5;
  }
  .series-tag {
    position: absolute; top: 82px; left: 24px;
    font-size: 20px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 4px;
    color: #FFFFFF; line-height: 1; z-index: 5;
  }
  .handle {
    position: absolute; bottom: 54px; right: 44px;
    font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.45); z-index: 5;
  }
  .page-no {
    position: absolute; bottom: 54px; left: 60px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.35);
    letter-spacing: 4px; z-index: 5;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="watermark">GOKATRADES</div>
    <div class="series-tag">NEWS · CHINA TCG</div>

    <div class="pack-col">
      <img src="../../../IMAGES/gem-pack-5/pack.png" alt="Gem Pack Vol 5">
    </div>

    <div class="vertical-label">DETAIL SET</div>

    <div class="info-panel">
      <div class="info-row">
        <div class="info-label">Nama Set</div>
        <div class="info-value">Gem Pack Vol. 5</div>
      </div>
      <div class="info-row">
        <div class="info-label">Rilis China</div>
        <div class="info-value"><span class="accent">24 April 2026</span></div>
      </div>
      <div class="info-row">
        <div class="info-label">Tema</div>
        <div class="info-value">Pokémon Horizons — Anime</div>
      </div>
      <div class="info-row">
        <div class="info-label">Isi Pack</div>
        <div class="info-value">4 kartu · <span class="accent">semua holo</span></div>
      </div>
      <div class="info-row">
        <div class="info-label">Spesial</div>
        <div class="info-value">6 varian holo per Pokémon</div>
      </div>
    </div>

    <div class="body-note">Sekuel Gem Pack Vol. 1 (Januari 2025) — fokus di starter Horizons dan Captain Pikachu.</div>

    <div class="page-no">02/05</div>
    <div class="handle">@gokatrades</div>
  </div>
</body>
</html>
