<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 07 - Engagement</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative; color: #FFFFFF;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .blurred-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('../../../IMAGES/graded/pikachu_illustrator.jpg');
    background-size: cover; background-position: center;
    filter: blur(50px) brightness(0.2) saturate(0.6); z-index: 0;
  }
  .vignette {
    position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
  }

  .watermark { position: absolute; top: 24px; left: 24px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: rgba(255, 68, 68, 0.9); padding: 10px 18px; border-radius: 4px;
  }
  .handle {
    position: absolute; bottom: 24px; right: 44px;
    font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.45); z-index: 10;
  }

  .content {
    position: relative; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; gap: 56px; text-align: center; padding: 0 60px;
  }

  .eyebrow {
    font-size: 24px; font-weight: 700; color: #FF4444;
    text-transform: uppercase; letter-spacing: 14px;
  }
  .eyebrow-underline { display: block; width: 70px; height: 4px; background: #FF4444; margin: 16px auto 0; }

  .question {
    font-weight: 700; text-transform: uppercase;
    line-height: 0.95; letter-spacing: -4px;
    text-shadow: 0 6px 28px rgba(0,0,0,0.85), 0 2px 8px rgba(0,0,0,0.7);
  }
  .question .row { display: block; font-size: 130px; }
  .question .white { color: #FFFFFF; }
  .question .red { color: #FF4444; }
  .question .green { color: #22C55E; }

  .comment-line {
    font-size: 36px; font-weight: 600; color: rgba(255,255,255,0.85);
    letter-spacing: 1px;
  }
  .comment-line .hl { color: #22C55E; font-weight: 700; }
</style>
</head>
<body>
  <div class="blurred-bg"></div>
  <div class="vignette"></div>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>

  <div class="content">
    <div>
      <div class="eyebrow">PILIH SATU<span class="eyebrow-underline"></span></div>
    </div>

    <div class="question">
      <span class="row white">JADINYA KALIAN</span>
      <span class="row white">PILIH <span class="red">MOBIL</span></span>
      <span class="row white">ATAU <span class="green">KARTU</span> ?</span>
    </div>

    <div class="comment-line">Tulis pilihan kalian di <span class="hl">komentar</span> 👇</div>
  </div>

</body>
</html>
