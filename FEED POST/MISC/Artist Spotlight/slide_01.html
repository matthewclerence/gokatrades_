<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01 - Shinji Kanda Artist Spotlight Hook</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative;
  }
  .blurred-bg {
    position: absolute; top: -80px; left: -80px;
    width: calc(100% + 160px); height: calc(100% + 160px);
    background-image: url('../../../IMAGES/kanda/roaring_moon_ex.jpg');
    background-size: cover; background-position: center;
    filter: blur(32px) brightness(0.25) saturate(0.7); z-index: 0;
  }

  .card-img {
    position: absolute; z-index: 2;
    top: 140px;
    left: 50%; transform: translateX(-50%);
    width: 820px; border-radius: 20px;
    box-shadow: 0 30px 90px rgba(0,0,0,0.75);
  }

  .text-scrim {
    position: absolute; z-index: 3;
    bottom: 0; left: 0; right: 0; height: 720px;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.78) 45%, transparent 100%);
  }

  .text-zone {
    position: absolute; z-index: 4; bottom: 110px; left: 50px; right: 50px;
  }
  .headline {
    font-weight: 700; text-transform: uppercase; line-height: 0.92;
    letter-spacing: -4px; text-align: left;
    text-shadow: 0 4px 20px rgba(0,0,0,0.9);
  }
  .headline span { display: block; font-size: 150px; color: #FFFFFF; }
  .headline .red { color: #FF4444; }

  .sub-tag {
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.65);
    text-transform: uppercase; letter-spacing: 6px;
    margin-bottom: 24px;
  }

  .swipe-cta {
    position: absolute; bottom: 54px; left: 50px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.45);
    text-transform: uppercase; letter-spacing: 6px; z-index: 5;
  }

  .watermark { position: absolute; top: 24px; left: 24px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: #FF4444; padding: 10px 18px; border-radius: 4px;
  }
  .series-tag {
    position: absolute; top: 82px; left: 24px; z-index: 10;
    font-size: 20px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 4px;
    color: #FFFFFF; line-height: 1;
  }
  .handle {
    position: absolute; bottom: 54px; right: 44px;
    font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.45); z-index: 10;
  }
</style>
</head>
<body>
  <div class="blurred-bg"></div>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>
  <div class="series-tag">MISC #3 · ARTIST SPOTLIGHT</div>

  <img class="card-img" src="../../../IMAGES/kanda/roaring_moon_ex.jpg" alt="Shinji Kanda Signature Card">

  <div class="text-scrim"></div>
  <div class="text-zone">
    <div class="sub-tag">Seniman Baru, Identitas Kuat</div>
    <div class="headline">
      <span>SIAPA</span>
      <span>SHINJI</span>
      <span class="red">KANDA?</span>
    </div>
  </div>

  <div class="swipe-cta">GESER &gt;&gt;&gt;&gt;&gt;</div>
  <div class="handle">@gokatrades</div>
</body>
</html>
