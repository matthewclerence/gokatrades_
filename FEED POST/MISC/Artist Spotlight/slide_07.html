<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 07 - CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative; color: #FFFFFF;
    display: flex; align-items: center; justify-content: center; }

  .cta-wrap {
    text-align: center; position: relative; z-index: 5;
    max-width: 900px; padding: 40px;
  }

  .cta-sub {
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.5);
    letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px;
  }

  .cta-lockup {
    font-size: 120px; font-weight: 700; letter-spacing: -4px;
    line-height: 0.95; margin-bottom: 30px;
  }
  .cta-lockup .white { color: #FFFFFF; }
  .cta-lockup .red { color: #FF4444; }

  .cta-tagline {
    font-size: 26px; font-weight: 500; color: rgba(255,255,255,0.75);
    line-height: 1.4; margin-bottom: 56px;
  }

  .cta-btn {
    display: inline-block;
    background: #FF4444;
    color: #FFFFFF;
    padding: 24px 60px;
    font-size: 28px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 6px;
    border-radius: 8px;
    margin-bottom: 50px;
  }

  .social-row {
    display: flex; gap: 36px; justify-content: center;
    font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.6);
    letter-spacing: 3px; text-transform: uppercase;
  }

  .watermark { position: absolute; top: 24px; left: 24px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: #FF4444; padding: 10px 18px; border-radius: 4px;
  }
  .series-tag {
    position: absolute; top: 82px; left: 24px; z-index: 10;
    font-size: 20px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 4px;
    color: #FFFFFF; line-height: 1;
  }
</style>
</head>
<body>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>
  <div class="series-tag">MISC #3 · ARTIST SPOTLIGHT</div>

  <div class="cta-wrap">
    <div class="cta-sub">Artist Spotlight · Shinji Kanda</div>
    <div class="cta-lockup"><span class="white">GOKA</span><span class="red">TRADES</span></div>
    <div class="cta-tagline">Follow untuk Artist Spotlight berikutnya + info Pokémon TCG paling lengkap di Indonesia.</div>
    <div class="cta-btn">Follow @gokatrades</div>
    <div class="social-row">
      <div>Instagram · @gokatrades</div>
      <div>TikTok · @gokatrades</div>
    </div>
  </div>
</body>
</html>
