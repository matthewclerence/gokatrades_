<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 04 - Kanda Signature Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative; color: #FFFFFF; }

  .section-label {
    position: absolute; top: 170px; left: 60px; z-index: 5;
    font-size: 24px; font-weight: 700; color: #FF4444;
    text-transform: uppercase; letter-spacing: 10px;
  }
  .section-label::after {
    content: ''; display: block; width: 70px; height: 4px;
    background: #FF4444; margin-top: 14px;
  }

  .headline {
    position: absolute; top: 240px; left: 60px; right: 60px; z-index: 5;
    font-size: 88px; font-weight: 700; color: #FFFFFF;
    line-height: 1.0; letter-spacing: -3px; text-transform: uppercase;
  }
  .headline .red { color: #FF4444; }

  .card-grid {
    position: absolute; top: 520px; left: 60px; right: 60px; z-index: 4;
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px;
  }
  .card-slot {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px;
    display: flex; flex-direction: column;
  }
  .card-img {
    height: 320px;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .card-name {
    font-size: 17px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.3px;
    margin-bottom: 3px; line-height: 1.1;
  }
  .card-set {
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.55);
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  .body-note {
    position: absolute; bottom: 130px; left: 60px; right: 60px; z-index: 5;
    font-size: 20px; font-weight: 400; color: rgba(255,255,255,0.75);
    line-height: 1.4; text-align: center;
  }

  .watermark { position: absolute; top: 24px; left: 24px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: #FF4444; padding: 10px 18px; border-radius: 4px;
  }
  .series-tag {
    position: absolute; top: 82px; left: 24px; z-index: 10;
    font-size: 20px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 4px;
    color: #FFFFFF; line-height: 1;
  }
  .handle {
    position: absolute; bottom: 54px; right: 44px;
    font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.45); z-index: 10;
  }
  .page-no {
    position: absolute; bottom: 54px; left: 60px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.35);
    letter-spacing: 4px; z-index: 10;
  }
</style>
</head>
<body>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>
  <div class="series-tag">MISC #3 · ARTIST SPOTLIGHT</div>

  <div class="section-label">KARTU IKONIK</div>
  <div class="headline">EMPAT KARYA<br>PALING <span class="red">DIBURU</span></div>

  <div class="card-grid">
    <div class="card-slot">
      <div class="card-img"><img src="../../../IMAGES/kanda/magikarp.jpg" alt="Magikarp AR"></div>
      <div class="card-name">Magikarp</div>
      <div class="card-set">Pokemon 151 · Art Rare</div>
    </div>
    <div class="card-slot">
      <div class="card-img"><img src="../../../IMAGES/kanda/roaring_moon_ex.jpg" alt="Roaring Moon ex SAR"></div>
      <div class="card-name">Roaring Moon ex</div>
      <div class="card-set">Scarlet ex · SAR</div>
    </div>
    <div class="card-slot">
      <div class="card-img"><img src="../../../IMAGES/kanda/absol.jpg" alt="Absol"></div>
      <div class="card-name">Absol</div>
      <div class="card-set">Crimson Haze</div>
    </div>
    <div class="card-slot">
      <div class="card-img"><img src="../../../IMAGES/kanda/aerodactyl.jpg" alt="Aerodactyl"></div>
      <div class="card-name">Aerodactyl</div>
      <div class="card-set">Pokemon 151</div>
    </div>
  </div>

  <div class="body-note">Setiap kartu punya motif tradisional tersembunyi — ombak, api, atau kamon di backgroundnya.</div>

  <div class="page-no">04/07</div>
  <div class="handle">@gokatrades</div>
</body>
</html>
