<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 05 - Kanda Loyal Three</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative; color: #FFFFFF; }

  .section-label {
    position: absolute; top: 170px; left: 60px; z-index: 5;
    font-size: 24px; font-weight: 700; color: #FF4444;
    text-transform: uppercase; letter-spacing: 10px;
  }
  .section-label::after {
    content: ''; display: block; width: 70px; height: 4px;
    background: #FF4444; margin-top: 14px;
  }

  .headline {
    position: absolute; top: 240px; left: 60px; right: 60px; z-index: 5;
    font-size: 88px; font-weight: 700; color: #FFFFFF;
    line-height: 1.0; letter-spacing: -3px; text-transform: uppercase;
  }
  .headline .red { color: #FF4444; }

  .triptych {
    position: absolute; top: 520px; left: 60px; right: 60px; z-index: 4;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px;
  }
  .trio-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 14px;
    aspect-ratio: 0.72;
    display: flex; flex-direction: column;
  }
  .trio-img {
    flex: 1;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .trio-img img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .trio-name {
    font-size: 20px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .trio-role {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5);
    letter-spacing: 2px; text-transform: uppercase;
  }

  .body-note {
    position: absolute; bottom: 150px; left: 60px; right: 60px; z-index: 5;
    font-size: 22px; font-weight: 400; color: rgba(255,255,255,0.8);
    line-height: 1.45;
  }
  .body-note .highlight { color: #FF4444; font-weight: 700; }

  .watermark { position: absolute; top: 24px; left: 24px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: #FF4444; padding: 10px 18px; border-radius: 4px;
  }
  .series-tag {
    position: absolute; top: 82px; left: 24px; z-index: 10;
    font-size: 20px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 4px;
    color: #FFFFFF; line-height: 1;
  }
  .handle {
    position: absolute; bottom: 54px; right: 44px;
    font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.45); z-index: 10;
  }
  .page-no {
    position: absolute; bottom: 54px; left: 60px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.35);
    letter-spacing: 4px; z-index: 10;
  }
</style>
</head>
<body>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>
  <div class="series-tag">MISC #3 · ARTIST SPOTLIGHT</div>

  <div class="section-label">RANGE KANDA</div>
  <div class="headline">BUKAN CUMA<br>SATU <span class="red">TIPE</span></div>

  <div class="triptych">
    <div class="trio-card">
      <div class="trio-img"><img src="../../../IMAGES/kanda/hypno.jpg" alt="Hypno"></div>
      <div class="trio-name">Hypno</div>
      <div class="trio-role">Psychic</div>
    </div>
    <div class="trio-card">
      <div class="trio-img"><img src="../../../IMAGES/kanda/sawk.jpg" alt="Sawk"></div>
      <div class="trio-name">Sawk</div>
      <div class="trio-role">Fighting</div>
    </div>
    <div class="trio-card">
      <div class="trio-img"><img src="../../../IMAGES/kanda/bronzong.jpg" alt="Bronzong"></div>
      <div class="trio-name">Bronzong</div>
      <div class="trio-role">Steel · Psychic</div>
    </div>
  </div>

  <div class="body-note">Dari Pokémon tarung sampai psikik — gaya Kanda <span class="highlight">konsisten</span> di semua tipe. Itu yang bikin koleksinya jadi set visual yang menyatu.</div>

  <div class="page-no">05/07</div>
  <div class="handle">@gokatrades</div>
</body>
</html>
