<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 02 - CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative; color: #FFFFFF;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .watermark { position: absolute; top: 24px; left: 24px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: #FF4444; padding: 10px 18px; border-radius: 4px;
  }
  .handle-bottom {
    position: absolute; bottom: 30px; right: 44px;
    font-size: 22px; font-weight: 600; color: #A0A0A0; z-index: 10;
  }

  .content {
    position: relative; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; gap: 38px; text-align: center; padding: 0 80px;
  }

  .eyebrow {
    font-size: 24px; font-weight: 700; color: #FFFFFF;
    letter-spacing: 6px; text-transform: uppercase;
    border: 1px solid #A0A0A0; padding: 10px 22px; border-radius: 4px;
  }

  .headline {
    font-size: 112px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: -4px; line-height: 0.92;
  }

  .tagline {
    font-size: 26px; font-weight: 400; color: #A0A0A0;
    line-height: 1.5; max-width: 720px;
  }

  .cta-button {
    display: inline-block; background: #FF4444; color: #FFFFFF;
    font-size: 30px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 5px; padding: 24px 64px; border-radius: 12px; margin-top: 4px;
  }

  .sub-actions {
    font-size: 24px; font-weight: 400; color: #A0A0A0;
    letter-spacing: 1px;
  }

  .divider { width: 80px; height: 3px; background: #2a2a2a; }

  .brand-logo {
    font-size: 88px; font-weight: 700; letter-spacing: -3px; line-height: 1;
    margin-top: 10px;
  }
  .brand-logo .white { color: #FFFFFF; }
  .brand-logo .accent { color: #FFFFFF; }

  .footer-links {
    font-size: 20px; font-weight: 400; color: #A0A0A0;
    letter-spacing: 5px; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>

  <div class="content">
    <div class="eyebrow">Set Matrix Pokemon</div>

    <div class="headline">Set Mana<br>Tipemu?</div>

    <div class="tagline">Komen di bawah — kita bantu pilih set yang cocok buat kamu.</div>

    <div class="cta-button">Follow Untuk Info Lainnya</div>

    <div class="sub-actions">Link di bio · Tulis komentar</div>

    <div class="divider"></div>

    <div class="brand-logo"><span class="white">GOKA</span><span class="accent">TRADES</span></div>

    <div class="footer-links">Berita · Harga · Komunitas</div>
  </div>

</body>
</html>
