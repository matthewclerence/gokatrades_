<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 02 - CTA (Black)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #111111; position: relative; color: #FFFFFF;
  }

  .watermark { position: absolute; top: 30px; left: 30px; z-index: 10; }
  .watermark-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 2px;
    background: #FF4444; padding: 10px 18px; border-radius: 4px;
  }

  .eyebrow {
    position: absolute; top: 170px; left: 0; right: 0;
    text-align: center;
    font-size: 28px; font-weight: 700;
    color: #FF4444;
    text-transform: uppercase;
    letter-spacing: 10px;
  }

  .headline {
    position: absolute; top: 220px; left: 60px; right: 60px;
    text-align: center;
    font-size: 108px; font-weight: 700;
    line-height: 0.95;
    letter-spacing: -3px;
    color: #FFFFFF;
  }
  .headline .red { color: #FF4444; }

  .sub {
    position: absolute; top: 540px; left: 60px; right: 60px;
    text-align: center;
    font-size: 26px; font-weight: 500;
    color: #A0A0A0;
    letter-spacing: 0.5px;
    line-height: 1.35;
  }

  .steps {
    position: absolute; top: 660px; left: 80px; right: 80px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 30px;
    background: #1A1A1A;
    border: 3px solid #FFFFFF;
    border-radius: 12px;
    padding: 28px 34px;
  }
  .num {
    width: 84px; height: 84px;
    background: #FF4444;
    color: #FFFFFF;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 54px; font-weight: 700;
    flex-shrink: 0;
    letter-spacing: -2px;
  }
  .step-text {
    font-size: 30px; font-weight: 600;
    color: #FFFFFF;
    line-height: 1.2;
  }
  .step-text b { color: #FF4444; }

  .footer {
    position: absolute; bottom: 70px; left: 0; right: 0;
    text-align: center;
  }
  .footer-label {
    font-size: 20px; font-weight: 600;
    color: #A0A0A0;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .footer-handle {
    font-size: 60px; font-weight: 700;
    color: #FF4444;
    letter-spacing: -2px;
  }
</style>
</head>
<body>
  <div class="watermark"><span class="watermark-text">GOKATRADES</span></div>

  <div class="eyebrow">POP QUIZ</div>
  <div class="headline">SUDAH BUKA<br>PACK YANG <span class="red">MANA?</span></div>
  <div class="sub">Ikutin 3 langkah &mdash; kita repost jawaban ter-unik di story!</div>

  <div class="steps">
    <div class="step">
      <div class="num">1</div>
      <div class="step-text">Screenshot slide bingo sebelumnya</div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div class="step-text">Silang pack yang kamu sudah pernah <b>brewek</b></div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div class="step-text">Post di story + tag <b>@gokatrades</b></div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-label">Tag us to get featured</div>
    <div class="footer-handle">@gokatrades</div>
  </div>
</body>
</html>
